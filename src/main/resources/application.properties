# ============================================================
# APPLICATION CONFIG
# ============================================================
spring.application.name=hariom-clinic-backend
server.port=${PORT:8080}

# ============================================================
# POSTGRESQL DATABASE CONFIG
# ============================================================
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:hariomclinic}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:Ketan@1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / HIBERNATE CONFIG
# spring.jpa.hibernate.ddl-auto=update -> auto creates/updates tables from entities
# spring.jpa.show-sql=true             -> prints SQL queries in console (dev only)
# spring.jpa.properties.hibernate.dialect -> tells Hibernate which SQL dialect to use
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# JWT CONFIG
# jwt.secret  -> Secret key used to sign JWT tokens (keep this private!)
# jwt.expiration -> Token validity in milliseconds (86400000 = 24 hours)
# ============================================================
jwt.secret=${JWT_SECRET:HariOmClinicSecretKey2024VeryLongSecretKeyForJWTSigning}
jwt.expiration=86400000

# ============================================================
# SWAGGER / OPENAPI CONFIG
# springdoc.api-docs.path    -> URL path for raw OpenAPI JSON
# springdoc.swagger-ui.path  -> URL path for Swagger UI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================================================
# CORS CONFIG (handled in code, but base path noted here)
# ============================================================
frontend.url=${FRONTEND_URL:http://localhost:3000}
